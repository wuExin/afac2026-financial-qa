# AFAC2026 赛道四 项目配置

# 模型配置（智谱 GLM；正式提交赛题时切回 Qwen 系列）
model:
  name: "glm-5.1"
  api_base: "https://open.bigmodel.cn/api/anthropic"
  fallback_name: ""  # 默认禁用 fallback，避免测试模型和提交模型混用
  max_tokens: 4096
  temperature: 0.0
  max_context_tokens: 80000  # 上下文截断上限（字符数估算）

# 数据路径
data:
  dataset_dir: "data/raw_dataset"
  raw_dir: "data/raw_dataset/raw"
  questions_dir: "data/raw_dataset/questions/group_a"
  markdown_dir: "data/merged_md"
  output_dir: "output"

# 检索配置
retrieval:
  enabled: true
  method: "bm25"  # bm25 或 keyword_window

  # BM25 参数
  bm25_k1: 1.5
  bm25_b: 0.75

  # 按领域设置 chunk 长度，避免财报/合同表格被切得太碎。
  chunk_size_chars: 2000
  chunk_overlap_chars: 250
  min_chunk_chars: 200

  # 命中 chunk 后向前/向后扩展，再按行边界修复。
  expand_before_chars: 800
  expand_after_chars: 1200
  merge_gap_chars: 500

  # 跨文档配额与题型预算。
  per_doc_min: 1
  per_doc_max:
    mcq: 2
    tf: 2
    multi: 3
  global_top_k:
    mcq: 6
    tf: 6
    multi: 10
  max_total_chars:
    mcq: 24000
    tf: 24000
    multi: 45000

  # PromptBuilder 仍会做单文档保护性截断，需高于常规召回片段总量。
  max_doc_chars: 45000
  min_score: 0.1
  max_query_terms: 120

  # 旧版 keyword_window 回退参数。
  window_chars: 3000
  window_overlap: 800
  top_k: 8
  per_doc_top_k: 3

# Agent 配置
agent:
  max_rounds: 1  # baseline 先单轮
  memory_compression: false  # baseline 先不压缩
  compression_threshold: 100000

# 评测配置
evaluation:
  token_budget: 5000000
  answer_format:
    mcq: "single"
    multi: "sorted"
    tf: "single"

# 领域配置
domains:
  insurance:
    name: "保险条款"
    doc_count: 16
  regulatory:
    name: "监管法规"
    doc_count: 26
  financial_contracts:
    name: "金融合同"
    doc_count: 14
  financial_reports:
    name: "财务报表"
    doc_count: 10
  research:
    name: "行业研报"
    doc_count: 20

# 检索日志（每次跑覆盖；落盘失败不影响主流程）
logging:
  log_retrieval: true
  retrieval_log_dir: "logs"
